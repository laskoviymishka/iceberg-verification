# Spec — ISOLATED int -> long type promotion (spec §schema-evolution, the one
# widening the spec pins as always legal). Unlike v3_schema_evolution_defaults,
# this exercises promote-type ALONE — no add-column bundled in — so it is the
# clean, minimal pin for the promotion behavior itself:
#
#   1. append two rows while the column is `int`,
#   2. promote the column int -> long (no other change),
#   3. read the pre-promotion rows back — they must now decode as `long`
#      (JSON string per the 64-bit rule), same numeric values, no data rewrite,
#   4. append a row with a value beyond int32 range (only valid as long),
#   5. read all three — every value decodes as long, including the large one.
#
# The load-bearing assertions: the post-promotion iceberg-schema types the column
# `long`, and the old int-written rows read back as long with identical values
# (promotion is metadata-only; existing data files are not rewritten). An impl
# that leaves the column typed int, or mis-widens the stored int bytes, fails.
#
# Authored-golden, minted from iceberg-java (the reference).

header:
  id: v3_promote_int_to_long
  format-version: 3
  spec-anchor: "table-spec#schema-evolution"
  table-uuid: "5d6e7f80-9122-3344-5566-778899aabbcc"
  seeds:
    snapshot-id: sequential
    commit-ts: "2026-01-01T00:00:00Z"
    file-paths: templated
  schema:
    fields:
      - { id: 1, name: id,  type: int, required: true }
      - { id: 2, name: val, type: string }

entries:
  - op: append
    rows:
      - { __rowkey: r1, id: !int 1,  val: !string "a" }
      - { __rowkey: r2, id: !int 42, val: !string "b" }

  - op: evolve-schema
    changes:
      - kind: promote-type
        field-id: 1
        to: long

  # pre-promotion rows read back as long, same values, no rewrite
  - op: observe
    at: latest
    expect:
      scan:
        rows:
          - { id: 1,  val: a }
          - { id: 42, val: b }

  # a value only representable as long, written after the promotion
  - op: append
    rows:
      - { __rowkey: r3, id: !long 10000000000, val: !string "c" }

  - op: observe
    at: latest
    expect:
      scan:
        rows:
          - { id: 1,           val: a }
          - { id: 42,          val: b }
          - { id: 10000000000, val: c }
