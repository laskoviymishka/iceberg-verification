# What iceberg-rust claims to support, verified against HEAD.
# The orchestrator runs the rust runner only over specs whose required features
# are listed here. A listed feature that then fails = a real failure. An
# UNLISTED feature a spec needs = exit 4 = a visible "unsupported" matrix cell
# (declared gap). Removing a gap comment when support lands is what lights up
# the cell — drift can't hide (protobuf-conformance failure-list discipline).
#
# READ vs WRITE are separate axes. A read fixture (source: artifact) needs only
# supports.read features; a DML/write fixture needs supports.write features.
# They genuinely differ: iceberg-rust APPLIES position deletes on scan but has
# no committable API to WRITE them — so read.delete.merge-on-read.position is
# supported while write.delete.merge-on-read.position is a gap.

implementation: iceberg-rust
version: HEAD      # replace with the pinned commit sha at PR time

supports:
  read:
    - artifact                             # load a checked-in table (StaticTable::from_metadata_file)
    - time-travel                          # scan().snapshot_id(id), arbitrary historical
    - types.primitive                      # boolean/int/long/float/double/string (runner: Phase 0-2 subset)
    - delete.merge-on-read.position        # a scan APPLIES position deletes already present in the table
  write:
    - append
    - time-travel

# DECLARED GAPS (exit 4):
#   write.delete.copy-on-write             # no delete/overwrite transaction action
#   write.delete.merge-on-read.position    # no position-delete writer; fast_append rejects non-Data files
#   write.delete.merge-on-read.equality    # equality-delete writer exists on disk but is not committable
#   write.delete.merge-on-read.deletion-vector
#   write.overwrite.copy-on-write
#   write.rewrite                          # no compaction / rewrite_data_files action
#   write.evolve-schema.promote-type       # UpdateSchemaAction supports add/delete column only
#   write.evolve-spec
#
# NOT YET WIRED IN THE RUNNER (iceberg-rust supports these; runner Phase 4 work, not a spec gap):
#   types.decimal / uuid / fixed / nested (struct/list/map), partition transforms
