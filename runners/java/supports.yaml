# What iceberg-java claims to support, verified against 1.11.0.
# The orchestrator runs the java runner only over specs whose required features
# are listed here. A listed feature that then fails = a real failure. An UNLISTED
# feature a spec needs = exit 4 = a visible "unsupported" matrix cell (declared
# gap). Java is the reference implementation — it supports the full DML surface;
# this file tracks what the RUNNER has wired so far.
#
# READ vs WRITE are separate axes. A read fixture (source: artifact) needs only
# supports.read features; a DML/write fixture needs supports.write features.

implementation: iceberg-java
version: 1.11.0

supports:
  read:
    - artifact                            # load a checked-in table (StaticTableOperations + BaseTable)
    - time-travel                         # IcebergGenerics.read(table).useSnapshot(id)
    - types.primitive
    - delete.merge-on-read.position       # scan applies position deletes present in the table
  write:
    - append
    - delete.merge-on-read.position       # PositionDeleteWriter + newRowDelta (positions self-computed)
    - time-travel
    - types.primitive                     # boolean/int/long/float/double/string (runner: Phase 0-2 subset)
    - evolve-schema.promote-type          # updateColumn type promotion (int->long, etc.)
    - evolve-schema.add-column            # addColumn(name,type,doc,Literal) with initial+write defaults
    - evolve-schema.drop-column           # deleteColumn
    - evolve-schema.rename-column         # renameColumn (id preserved)
    - rewrite                             # table.newRewrite() consolidation (pure core)

# NOT YET WIRED IN THE RUNNER (iceberg-java supports these in pure core; runner TODO):
#   write.delete.copy-on-write            # newDelete().deleteFromRowFilter (whole-file)
#   write.delete.merge-on-read.deletion-vector  # BaseDVFileWriter (v3); the 1.11 pin lacks nextRowId etc.
#   types.decimal / uuid / fixed / nested + partition transforms (nested build/decode)
#
# Because Java is the reference, its output on the shared fixtures is the ground
# truth the orchestrator diffs the other implementations against.
